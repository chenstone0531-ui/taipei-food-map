<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台北美食地圖</title>
<style>
:root{--bg:#fff7f0;--card:#fff;--ink:#2b241e;--muted:#9a8d7d;--brand:#e8552d;--brand2:#ffb347;--line:#f0e3d6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:560px;margin:0 auto;padding-bottom:30px}
.head{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:22px 20px 18px;border-radius:0 0 22px 22px;box-shadow:0 4px 18px rgba(232,85,45,.25)}
.head h1{font-size:24px;letter-spacing:2px}
.head p{font-size:13px;opacity:.92;margin-top:4px}
.map-box{margin:14px 16px 0;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);background:#eee;height:240px}
.map-box iframe{width:100%;height:100%;border:0;display:block}
.cats{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;padding:8px 16px;border-radius:20px;background:var(--card);border:1px solid var(--line);
  font-size:14px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s}
.cat.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.list{padding:6px 16px}
.item{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;gap:14px;
  align-items:center;cursor:pointer;transition:.2s;border:1px solid var(--line)}
.item:active{transform:scale(.98)}
.item.on{border-color:var(--brand);box-shadow:0 4px 14px rgba(232,85,45,.18)}
.emoji{font-size:34px;flex:0 0 auto;width:54px;height:54px;background:var(--bg);border-radius:14px;display:flex;align-items:center;justify-content:center}
.info{flex:1;min-width:0}
.info .n{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
.info .tag{font-size:11px;background:#fff0e8;color:var(--brand);padding:2px 8px;border-radius:8px;font-weight:400}
.info .d{font-size:13px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.info .meta{font-size:12px;color:#c0a;margin-top:5px;display:flex;gap:12px}
.info .meta span{color:var(--muted)}
.info .star{color:#f5a623;font-weight:600}
.nav{flex:0 0 auto;width:42px;height:42px;border-radius:50%;background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>🍜 台北美食地圖</h1>
    <p>精選在地必吃 · 點一下看位置、按 ➤ 直接導航</p>
  </div>
  <div class="map-box"><iframe id="map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src=""></iframe></div>
  <div class="cats" id="cats"></div>
  <div class="list" id="list"></div>
  <div class="foot">資料僅供參考 · 地圖來源 Google Maps</div>
</div>
<script>
const data=[
 {n:"鼎泰豐 信義店",e:"🥟",c:"小吃",tag:"米其林",d:"世界級小籠包，皮薄餡多",addr:"台北市信義區信義路二段194號",star:4.4,price:"$$"},
 {n:"林東芳牛肉麵",e:"🍜",c:"麵食",tag:"老店",d:"清燉牛肉麵名店，湯頭濃郁",addr:"台北市中山區八德路二段322號",star:4.3,price:"$$"},
 {n:"阜杭豆漿",e:"🥖",c:"早餐",tag:"排隊",d:"華山市場排隊早餐，厚燒餅必點",addr:"台北市中正區忠孝東路一段108號2樓",star:4.4,price:"$"},
 {n:"饒河街觀光夜市",e:"🌃",c:"夜市",tag:"必逛",d:"福州胡椒餅、藥燉排骨一條街",addr:"台北市松山區饒河街",star:4.3,price:"$"},
 {n:"添好運 信義店",e:"🍤",c:"港點",tag:"米其林",d:"酥皮叉燒包，平價港式點心",addr:"台北市信義區松壽路12號",star:4.1,price:"$$"},
 {n:"陳家涼麵",e:"🥗",c:"小吃",tag:"24h",d:"芝麻醬涼麵配味噌湯，宵夜首選",addr:"台北市松山區南京東路五段123巷",star:4.2,price:"$"},
 {n:"馬辣頂級麻辣鴛鴦火鍋",e:"🍲",c:"火鍋",tag:"吃到飽",d:"麻辣鍋＋海鮮哈根達斯吃到飽",addr:"台北市萬華區漢中街52號8樓",star:4.3,price:"$$$"},
 {n:"金峰魯肉飯",e:"🍚",c:"小吃",tag:"在地",d:"中正紀念堂旁，魯肉飯排骨湯經典",addr:"台北市中正區羅斯福路一段10號",star:4.4,price:"$"},
 {n:"永康街芒果冰 ICE MONSTER",e:"🍧",c:"甜點",tag:"必吃",d:"新鮮芒果雪花冰，夏日聖品",addr:"台北市大安區忠孝東路四段297號",star:4.2,price:"$$"},
 {n:"度小月擔仔麵",e:"🍤",c:"麵食",tag:"百年",d:"台南名物擔仔麵，蝦捲滷味",addr:"台北市大安區忠孝東路四段9-1號",star:4.0,price:"$$"},
 {n:"天津蔥抓餅",e:"🫓",c:"小吃",tag:"排隊",d:"永康街手工蔥抓餅，加蛋加九層塔",addr:"台北市大安區永康街6巷1號",star:4.4,price:"$"},
 {n:"開封食堂",e:"🥩",c:"火鍋",tag:"宵夜",d:"平價個人鍋，肉量大份",addr:"台北市中正區開封街一段",star:4.1,price:"$$"}
];
const cats=["全部","小吃","麵食","早餐","夜市","港點","火鍋","甜點"];
let activeCat="全部",activeItem=null;

function mapSrc(q){return "https://www.google.com/maps?q="+encodeURIComponent(q)+"&z=16&output=embed";}
function navUrl(q){return "https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(q);}

function renderCats(){
  document.getElementById('cats').innerHTML=cats.map(c=>
    `<div class="cat${c===activeCat?' on':''}" onclick="setCat('${c}')">${c}</div>`).join('');
}
function setCat(c){activeCat=c;renderCats();renderList();}
function renderList(){
  const items=data.filter(d=>activeCat==='全部'||d.c===activeCat);
  document.getElementById('list').innerHTML=items.map(d=>{
    const i=data.indexOf(d);
    return `<div class="item${activeItem===i?' on':''}" onclick="show(${i})">
      <div class="emoji">${d.e}</div>
      <div class="info">
        <div class="n">${d.n} <span class="tag">${d.tag}</span></div>
        <div class="d">${d.d}</div>
        <div class="meta"><span class="star">★ ${d.star}</span><span>${d.price}</span><span>${d.c}</span></div>
      </div>
      <a class="nav" href="${navUrl(d.addr)}" target="_blank" onclick="event.stopPropagation()">➤</a>
    </div>`;
  }).join('');
}
function show(i){
  activeItem=i;const d=data[i];
  document.getElementById('map').src=mapSrc(d.n+" "+d.addr);
  renderList();
  document.querySelector('.map-box').scrollIntoView({behavior:'smooth',block:'center'});
}
renderCats();renderList();
document.getElementById('map').src=mapSrc("台北 美食");
</script>
</body>
</html>
